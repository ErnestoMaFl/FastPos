<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>POS Abarrotes Rápido</title>
  
  <script src="https://cdn.jsdelivr.net/npm/fuse.js/dist/fuse.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="pantalla-busqueda">
    
    <div id="reader-container">
      <div id="reader"></div>
    </div>

    <div class="search-container">
      <button id="micBtn" onclick="startVoice()">🎤</button>
      <input type="text" id="busqueda" placeholder="Buscar por nombre o código..." oninput="filtrar()" autocomplete="off">
    </div>
    
    <div id="resultados"></div>
  </div>

  <div id="pantalla-cantidad">
    <div class="header-cantidad">
      <button class="btn-volver" onclick="volverBusqueda()">← Cancelar</button>
    </div>
    
    <div class="producto-detalle">
      <h2 id="selNombre">Nombre del Producto</h2>
      <div class="precio-unitario" id="selPrecio">$0.00 x unidad</div>
    </div>

    <form onsubmit="confirmar(event)">
      <div class="input-wrapper">
        <label for="inputCantidad">Cantidad:</label>
        <input type="number" id="inputCantidad" inputmode="decimal" step="any" value="1" oninput="calcularTotal()">
      </div>
      <div class="total-box">
        Total: <span id="selTotal">$0.00</span>
      </div>
      <button type="submit" class="btn-confirmar">✓ Agregar (Enter)</button>
    </form>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
